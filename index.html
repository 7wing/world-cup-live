<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#121414" />
    <meta name="description" content="World Cup Live - The heart of the game. Live scores, fan zone, stadium ratings and more." />
    <title>World Cup Live</title>

    <!-- Fonts: block icons until loaded (prevents "sports_soccer" text flash) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap"
    />
    <style>
      body {
        margin: 0;
      }
      html:not(.fonts-ready) .material-symbols-outlined {
        visibility: hidden !important;
      }
      #root:empty::before {
        content: '';
        display: block;
        min-height: 100vh;
        background: #121414;
      }
    </style>
    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
